{% set name = "av" %}
{% set version = "16.1.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: a094b4fd87a3721dacf02794d3d2c82b8d712c85b9534437e82a8a978c175ffd
  patches:
    # Convert test h264 references to openh264 (works with both GPL and LGPL ffmpeg)
    - patches/0001-Convert-h264-tests-to-openh264-for-lgpl-build.patch
    # Disable Py_LIMITED_API to build per-Python-version (upstream uses cp311 ABI)
    - patches/0002-Disable-cp111-abi.patch
    - patches/cleanup_more_pylimited.patch

build:
  number: 0
  # Upstream supports >=3.9; we disable Py_LIMITED_API so each version builds separately
  skip: true  # [py<310]
  script:
    - {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  run_exports:
    # PyAV follows semantic versioning
    - {{ pin_subpackage('av') }}

requirements:
  build:
    - {{ compiler('c') }}
    - pkg-config  # [not win]
  host:
    - python
    - pip
    - setuptools
    - cython
    - numpy
    - ffmpeg {{ ffmpeg }}
  run:
    - python
    - pillow
    - numpy >=1.22

test:
  imports:
    - av
    - av.audio
    - av.audio.fifo
    - av.video
  requires:
    - pip
  commands:
    - pip check
    - python -c "import av; print('FFmpeg version:', av.library_versions)"

about:
  home: https://github.com/PyAV-Org/PyAV/
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.txt
  summary: Pythonic bindings for FFmpeg.
  description: |
    PyAV is a Pythonic binding for FFmpeg or Libav. We aim to provide all of
    the power and control of the underlying library, but manage the gritty
    details as much as possible.
  doc_url: https://pyav.org/docs/develop/
  dev_url: https://github.com/PyAV-Org/PyAV/

extra:
  recipe-maintainers:
    - danielballan
    - mikeboers
    - sdvillal
    - h-vetinari
    - hmaarrfk
    - xkong-anaconda
