{% set version = "10.0.0" %}

package:
  name: av
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/a/av/av-{{ version }}.tar.gz
  sha256: 8afd3d5610e1086f3b2d8389d66672ea78624516912c93612de64dcaa4c67e05

build:
  number: 5
  # avoid the old Cython build getting forced on py<3.10 and py>=3.13
  skip: true  # [py<310 or py>=313]
  script: {{ PYTHON }} -m pip install . --no-deps --no-cache-dir --no-build-isolation -vv

requirements:
  build:
    - {{ compiler('c') }}
    - pkg-config  # [not win]
    # cross-compile helpers (only when build != target)
    - python  # [build_platform != target_platform]
    - numpy   # [build_platform != target_platform]
    - cython >=0.29.36,<3

  host:
    - python
    - pip
    - numpy
    - ffmpeg
    - pillow

  run:
    - python
    - {{ pin_compatible('numpy') }}
    - pillow

test:
  imports:
    - av
  commands:
    - python - <<'PY'
      from importlib.metadata import version
      import av
      print("av __version__:", getattr(av, "__version__", "unknown"))
      print("pkg version:", version("av"))
PY

about:
  home: https://github.com/PyAV-Org/PyAV
  license: BSD-3-Clause
  license_family: BSD
  summary: Pythonic bindings for FFmpeg/Libav (PyAV)
  doc_url: https://pyav.org/docs/develop/
  dev_url: https://github.com/PyAV-Org/PyAV

extra:
  skip-lints:
    - host_section_needs_exact_pinnings
    - avoid_noarch
  recipe-maintainers:
    - ianaobi
    - danielballan
    - mikeboers
    - sdvillal
    - h-vetinari
    - hmaarrfk

